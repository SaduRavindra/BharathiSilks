spring.application.name=bharathi-silks
server.port=8080

# In-memory H2 (data resets on restart; seeded on startup)
spring.datasource.url=jdbc:h2:mem:bharathi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Browse the DB at http://localhost:8080/h2-console (JDBC URL above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
