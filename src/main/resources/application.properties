spring.application.name=bharathi-silks
server.port=8080

# In-memory H2 (data resets on restart; seeded on startup)
spring.datasource.url=jdbc:h2:mem:bharathi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Browse the DB at http://localhost:8080/h2-console (JDBC URL above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Auth ---
# HMAC secret for signing app JWTs (override via JWT_SECRET in prod). Must be >= 32 chars.
jwt.secret=${JWT_SECRET:bharathi-silks-dev-secret-change-me-please-0123456789}
jwt.ttl-ms=86400000
# One-time code (Google redirect -> token exchange) lifetime.
auth.login-code.ttl-seconds=120

# Phone OTP. No SMS gateway is wired, so in dev the code is returned/logged.
otp.ttl-seconds=300
otp.expose-code=true

# Google sign-in (server-side redirect). Set both to enable the Google button.
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Where the browser lands (with the JWT in the URL fragment) after Google login.
app.oauth2.redirect=/admin
