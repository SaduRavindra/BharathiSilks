<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bharathi Silks — Admin Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --maroon:#6E1423; --maroon-deep:#510E1A; --gold:#B68A3E; --gold-soft:#E7CF9B;
  --ink:#241712; --ivory:#FAF6EE; --cream:#F1E7D5; --paper:#FFFFFF;
  --line:rgba(110,20,35,.14); --muted:#8C7C6B;
  --ok:#1E7A4D; --ok-bg:#E6F2EA; --warn:#B45309; --warn-bg:#FBEEDD; --danger:#A41E22; --danger-bg:#F8E5E5;
  --info:#1F5E8C; --info-bg:#E4EEF5;
  --shadow:0 1px 2px rgba(36,23,18,.06), 0 8px 24px rgba(36,23,18,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;color:var(--ink);background:var(--ivory);-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 0 0, rgba(182,138,62,.06), transparent 40%);}
.mono{font-family:'DM Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px}
#app{display:flex;min-height:100vh}
aside{width:248px;flex-shrink:0;color:var(--ivory);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  background-image:linear-gradient(180deg, var(--maroon) 0%, var(--maroon-deep) 100%);}
.brand{padding:24px 24px 20px;border-bottom:1px solid rgba(231,207,155,.18)}
.brand .mark{display:flex;align-items:center;gap:10px}
.brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:.3px;line-height:1.05}
.brand .diamond{width:18px;height:18px;transform:rotate(45deg);border:1.5px solid var(--gold-soft);position:relative;flex-shrink:0}
.brand .diamond::after{content:"";position:absolute;inset:4px;background:var(--gold)}
.brand p{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);margin-top:9px;opacity:.85}
nav{padding:12px 12px;display:flex;flex-direction:column;gap:3px;flex:1;overflow:auto}
.navbtn{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:9px;color:rgba(250,246,238,.78);font-weight:500;font-size:14px;text-align:left;width:100%;transition:.15s}
.navbtn svg{width:18px;height:18px;opacity:.9;flex-shrink:0}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff}
.navbtn.active{background:var(--gold);color:var(--maroon-deep);font-weight:600}
aside .foot{padding:14px 18px;border-top:1px solid rgba(231,207,155,.18);font-size:11px;color:rgba(231,207,155,.7);display:flex;flex-direction:column;gap:8px}
.linkbtn{font-size:11.5px;color:var(--gold-soft);text-decoration:underline;text-underline-offset:2px;text-align:left}
main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:22px 30px 0;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.topbar .kicker{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600}
.topbar h2{font-family:'Fraunces',serif;font-weight:600;font-size:27px;margin-top:4px}
.content{padding:20px 30px 48px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.stat .lbl{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat .val{font-size:27px;font-weight:600;margin-top:7px;letter-spacing:-.5px}
.stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
.stat .val.gold{color:var(--gold)} .stat .val.ok{color:var(--ok)}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.panel-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-h h3{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
.panel-b{padding:4px 0}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:11px 20px;background:var(--cream)}
td{padding:12px 20px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(241,231,213,.4)}
.sku{font-family:'DM Mono',monospace;font-size:12px;color:var(--maroon);font-weight:500}
.price{font-family:'DM Mono',monospace;font-weight:500}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge.ok{background:var(--ok-bg);color:var(--ok)} .badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.out{background:var(--danger-bg);color:var(--danger)} .badge.cat{background:var(--cream);color:var(--maroon)}
.badge.info{background:var(--info-bg);color:var(--info)} .badge.gold{background:#F6ECD4;color:var(--gold)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.live{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ok);font-weight:600}
.live .dot{background:var(--ok);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.attr{font-size:11px;color:var(--muted)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
.field label{font-size:12px;font-weight:600;letter-spacing:.2px}
.input,.select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);transition:.15s}
.input:focus,.select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(182,138,62,.15)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:13px} .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:9px;font-weight:600;font-size:14px;transition:.15s}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--maroon);color:#fff} .btn-primary:hover{background:var(--maroon-deep)}
.btn-gold{background:var(--gold);color:var(--maroon-deep)} .btn-gold:hover{filter:brightness(1.05)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink)} .btn-ghost:hover{background:var(--cream)}
.btn-wa{background:#1FA855;color:#fff} .btn-wa:hover{filter:brightness(1.05)}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:7px}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger-bg)} .btn-danger:hover{background:var(--danger-bg)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tinp{width:62px;padding:7px 8px;border:1px solid var(--line);border-radius:7px;text-align:center;font-family:'DM Mono',monospace}
.search{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px 12px;min-width:200px}
.search svg{width:16px;height:16px;color:var(--muted)} .search input{border:none;outline:none;flex:1;background:none}
.filterbtn{padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:600;border:1px solid var(--line);color:var(--muted);background:var(--paper)}
.filterbtn.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.lblgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:8px}
.lbl{border:1px dashed var(--line);border-radius:10px;padding:14px;text-align:center;background:var(--paper)}
.lbl .nm{font-weight:600;font-size:13px;margin-bottom:2px} .lbl .at{font-size:10px;color:var(--muted);margin-bottom:4px}
.lbl .pr{font-family:'DM Mono',monospace;font-size:13px;color:var(--maroon);font-weight:500;margin-bottom:8px}
.lbl svg{max-width:100%;height:56px}
.lbl .store{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
.pos{display:grid;grid-template-columns:1.25fr 1fr;gap:20px;align-items:start}
.scanbox{background:var(--paper);border:2px solid var(--gold);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.scanbox.flash{animation:flash .5s}
@keyframes flash{0%{background:#fff}30%{background:var(--ok-bg)}100%{background:#fff}}
.scaninput{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:10px;font-family:'DM Mono',monospace;font-size:16px;letter-spacing:1px}
.scaninput:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(182,138,62,.18)}
.poshint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.quickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;margin-top:14px}
.quick{border:1px solid var(--line);border-radius:10px;padding:0;text-align:left;background:var(--paper);transition:.15s;overflow:hidden}
.quick:hover{border-color:var(--gold);background:var(--cream)} .quick:disabled{opacity:.4}
.qimg{height:88px;background:linear-gradient(135deg,var(--maroon),var(--gold));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:.5px}
.qimg img{width:100%;height:100%;object-fit:cover;display:block}
.qbody{padding:10px 11px 11px}
.quick .qn{font-weight:600;font-size:12.5px;line-height:1.25} .quick .qp{font-family:'DM Mono',monospace;font-size:12px;color:var(--maroon);margin-top:4px}
.quick .qs{font-size:10.5px;color:var(--muted);margin-top:2px}
.bill{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;position:sticky;top:18px}
.bill-h{padding:14px 18px;background:var(--maroon);color:#fff;display:flex;align-items:center;justify-content:space-between}
.bill-h h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.cust{padding:12px 18px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--cream)}
.cust input{padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff}
.custnote{grid-column:1/3;font-size:11.5px;color:var(--muted)}
.bill-items{max-height:260px;overflow:auto}
.bi{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--line)}
.bi .binm{flex:1;min-width:0} .bi .binm .n{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bi .binm .s{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.qctl{display:flex;align-items:center;gap:6px}
.qbtn{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--paper)}
.qbtn:hover{background:var(--cream)}
.qnum{font-family:'DM Mono',monospace;width:22px;text-align:center;font-weight:500}
.bi .lt{font-family:'DM Mono',monospace;font-weight:500;width:80px;text-align:right}
.empty{padding:38px 20px;text-align:center;color:var(--muted);font-size:13.5px}
.bill-foot{padding:14px 18px;border-top:1px solid var(--line)}
.trow{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:7px;color:var(--muted)}
.trow.total{font-size:18px;font-weight:700;color:var(--ink);margin-top:8px;padding-top:10px;border-top:1px dashed var(--line)}
.trow.total .price{font-size:18px}
.disc-wrap{display:flex;align-items:center;gap:6px}
.disc-wrap input{width:64px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;text-align:right;font-family:'DM Mono',monospace}
.disc-wrap select{border:1px solid var(--line);border-radius:6px;padding:4px;font-size:12px}
.paymodes{display:flex;gap:6px;margin:10px 0}
.paymode{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;font-weight:600;text-align:center;color:var(--muted)}
.paymode.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
#reader{width:100%;border-radius:10px;overflow:hidden;margin-top:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-weight:500;font-size:14px;box-shadow:0 12px 30px rgba(0,0,0,.25);transition:.3s;z-index:100;display:flex;align-items:center;gap:9px;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--ok)} #toast.err{background:var(--danger)}
.modal-bg{position:fixed;inset:0;background:rgba(36,23,18,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:90}
.modal{background:var(--paper);border-radius:16px;max-width:430px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow:auto}
.modal h3{font-family:'Fraunces',serif;font-size:22px;margin-bottom:6px}
.modal .chk{width:48px;height:48px;border-radius:50%;background:var(--ok-bg);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.modal .chk svg{width:26px;height:26px}
.hint{background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:13px 16px;font-size:13px;line-height:1.55;margin-bottom:18px;display:flex;gap:10px}
.hint svg{width:18px;height:18px;color:var(--gold);flex-shrink:0;margin-top:1px}
.bar{height:8px;border-radius:6px;background:var(--cream);overflow:hidden}
.bar > span{display:block;height:100%;background:var(--gold)}
@media(max-width:860px){.pos{grid-template-columns:1fr}.bill{position:static}}
@media(max-width:760px){
  #app{flex-direction:column} aside{width:100%;height:auto;position:static}
  nav{flex-direction:row;overflow-x:auto;padding:10px;gap:6px} .navbtn{white-space:nowrap;padding:9px 13px}
  aside .foot{flex-direction:row;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px}
  aside .foot .userchip{border-bottom:none;padding-bottom:0;margin-bottom:0}
  .topbar,.content{padding-left:16px;padding-right:16px} .row2,.row3{grid-template-columns:1fr}
  .panel-b{overflow-x:auto;-webkit-overflow-scrolling:touch} .panel-b table{min-width:600px}
}
#print-area{display:none}
@media print{
  body{background:#fff} #app,#toast{display:none!important} #print-area{display:block!important;padding:10px}
  .lblgrid{padding:0} .lbl{break-inside:avoid;border:1px solid #ccc}
  .receipt{max-width:320px;margin:0 auto;font-family:'DM Mono',monospace;font-size:12px}
  .receipt h2{font-family:'Fraunces',serif;text-align:center;font-size:20px}
}
#authgate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;z-index:200;
  background-image:linear-gradient(180deg,var(--maroon) 0%,var(--maroon-deep) 100%)}
.loginwrap{width:100%;max-width:380px}
.loginbrand{display:flex;align-items:center;gap:12px;color:var(--ivory);margin-bottom:18px;justify-content:center}
.loginbrand h1{font-family:'Fraunces',serif;font-weight:600;font-size:24px;line-height:1}
.loginbrand p{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);margin-top:5px}
.logincard{background:var(--paper);border-radius:16px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logincard h2{font-family:'Fraunces',serif;font-size:22px;margin-bottom:16px}
.gbtn{width:100%;justify-content:center;gap:10px}
.ordiv{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:14px 0}
.ordiv::before,.ordiv::after{content:"";flex:1;height:1px;background:var(--line)}
.devcode{background:var(--cream);border:1px dashed var(--gold);border-radius:8px;padding:8px 10px;font-family:'DM Mono',monospace;font-size:13px;color:var(--maroon);margin-bottom:6px}
.loginnote{font-size:12px;color:var(--muted);margin-top:12px;text-align:center;line-height:1.5}
.loginsub{font-size:13px;color:var(--muted);margin:-8px 0 18px}
.loginbrand .diamond{width:20px;height:20px;transform:rotate(45deg);border:1.5px solid var(--gold-soft);position:relative;flex-shrink:0}
.loginbrand .diamond::after{content:"";position:absolute;inset:4px;background:var(--gold)}
.lrow{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.linklike{font-size:11.5px;color:var(--gold);font-weight:600;cursor:pointer;background:none;border:none}
.linklike:hover{text-decoration:underline}
.backstore{display:block;text-align:center;margin-top:16px;font-size:12.5px;color:var(--gold-soft)}
.backstore:hover{color:#fff}
.btn:disabled{opacity:.6;cursor:default}
.remember{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);margin-top:12px;cursor:pointer;user-select:none}
.remember input{width:14px;height:14px;accent-color:var(--maroon)}
.userchip{display:flex;align-items:center;gap:9px;padding:2px 2px 10px;margin-bottom:6px;border-bottom:1px solid rgba(231,207,155,.16)}
.userchip .avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--gold);color:var(--maroon-deep);font-weight:700;font-size:12px;overflow:hidden;border:1px solid rgba(231,207,155,.4)}
.userchip .avatar img{width:100%;height:100%;object-fit:cover}
.userchip .uinfo{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.userchip .uinfo b{font-size:13px;color:var(--ivory);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.userchip .uinfo small{font-size:10px;color:var(--gold-soft);text-transform:capitalize}
.footlinks{display:flex;gap:14px;flex-wrap:wrap}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.ocard{margin:0}
.oitems{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.oi{display:flex;gap:10px;align-items:center}
.oi-t{width:40px;height:40px;border-radius:8px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;font-weight:600;font-size:15px}
.oi-t img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="app" style="display:none">
  <aside>
    <div class="brand"><div class="mark"><span class="diamond"></span><h1>Bharathi Silks</h1></div><p>Admin Console</p></div>
    <nav id="nav"></nav>
    <div class="foot">
      <div class="userchip" id="userchip"><span class="avatar" id="uAvatar"></span><span class="uinfo"><b id="uName"></b><small id="uRole"></small></span></div>
      <span class="live"><span class="dot"></span> Live stock sync</span>
      <div class="footlinks"><button class="linkbtn" id="resetBtn">Reset demo data</button><button class="linkbtn" id="logoutBtn">Sign out</button></div>
    </div>
  </aside>
  <main>
    <div class="topbar"><div><div class="kicker" id="kicker"></div><h2 id="title"></h2></div><div id="topActions"></div></div>
    <div class="content" id="view"></div>
  </main>
</div>
<div id="authgate"></div>
<div id="print-area"></div>
<div id="toast"></div>
<script>
/* ============================================================================
   DEMO BACKEND — preview hosts only (GitHub Pages / localhost / file://).
   Intercepts /api/* calls and serves dummy data from localStorage so the whole
   console (login, inventory, billing, customers, reports) is usable without a
   server. On the real domain this is inert and the app talks to Spring Boot.
   ============================================================================ */
(function(){
  const host=location.hostname;
  const PREVIEW=/(^|\.)github\.io$/i.test(host)||['localhost','127.0.0.1',''].indexOf(host)>=0;
  if(!PREVIEW)return;

  const DB='bs-demo-db', UKEY='bs-demo-user', RKEY='bs-demo-role', DEV_CODE='424242', POINTS_PER=200;
  const gst=p=>p>1000?12:5;
  const pre=c=>(c||'Other').slice(0,3).toUpperCase();
  const role=()=>{try{return (JSON.parse(localStorage.getItem(UKEY)||'{}').role||'OWNER').toUpperCase();}catch(e){return 'OWNER';}};
  const isOwnerRole=()=>{const r=role();return r==='OWNER'||r==='ADMIN';};
  const ikey=(n,s,c)=>((n||'').trim().toLowerCase())+'|'+((s||'').trim().toLowerCase())+'|'+((c||'').trim().toLowerCase());
  function ensureCat(db,name){name=(name==null||!String(name).trim())?'Other':String(name).trim();let c=db.categories.find(x=>x.name.toLowerCase()===name.toLowerCase());if(!c){c={name:name,prefix:pre(name)};db.categories.push(c);}return c;}
  function logA(db,action,entity,ref,detail){db.audit.unshift({time:Date.now(),actor:'demo:'+role().toLowerCase(),action:action,entity:entity,ref:ref||'',detail:detail||''});if(db.audit.length>500)db.audit.length=500;}
  function mkProduct(db,body,size,color){const cat=ensureCat(db,body.category);const k=cat.prefix;db.counters[k]=(db.counters[k]||0)+1;const price=Math.max(0,+body.price||0);
    return {sku:'BS-'+k+'-'+String(db.counters[k]).padStart(4,'0'),name:body.name||'Untitled',category:cat.name,styleCode:(body.styleCode||'').trim(),fabric:(body.fabric||'').trim(),design:(body.design||'').trim(),size:size||'—',color:(color||'').trim(),imageUrl:(body.imageUrl||'').trim(),cost:Math.max(0,+body.cost||0),price:price,gst:gst(price),stock:Math.max(0,Math.floor(+body.stock||0))};}
  const ORD_KEY='bs-demo-orders';
  const ORDER_FLOW_S=['PLACED','CONFIRMED','PACKED','SHIPPED','DELIVERED'];
  function seedOrders(){const now=Date.now();return {
    'ORD-01001':{ref:'ORD-01001',date:now-2*864e5,name:'Anjali Menon',phone:'9846012345',address:'12 Gandhi Road, Chennai 600001',fulfilment:'Delivery',status:'SHIPPED',note:'',items:[{sku:'BS-SAR-0001',name:'Kanjivaram Pure Silk',price:18500,qty:1,imageUrl:''}],total:18500,timeline:[{status:'PLACED',at:now-2*864e5},{status:'CONFIRMED',at:now-2*864e5+3600000},{status:'PACKED',at:now-15*864e4},{status:'SHIPPED',at:now-864e5}]},
    'ORD-01002':{ref:'ORD-01002',date:now-3600000,name:'Karthik R',phone:'9000022222',address:'',fulfilment:'Pickup',status:'PLACED',note:'',items:[{sku:'BS-KUR-0001',name:'Festive Anarkali Kurti',price:1499,qty:2,imageUrl:''},{sku:'BS-OTH-0001',name:'Silk Potli Bag',price:980,qty:1,imageUrl:''}],total:3978,timeline:[{status:'PLACED',at:now-3600000}]}
  };}
  function loadOrders(){try{const o=JSON.parse(localStorage.getItem(ORD_KEY));if(o&&typeof o==='object')return o;}catch(e){}const s=seedOrders();localStorage.setItem(ORD_KEY,JSON.stringify(s));return s;}
  function saveOrders(o){localStorage.setItem(ORD_KEY,JSON.stringify(o));}
  function ordersList(){return Object.values(loadOrders()).sort((a,b)=>b.date-a.date);}
  const J=(o,s)=>(s===204)?new Response(null,{status:204}):new Response(JSON.stringify(o),{status:s||200,headers:{'Content-Type':'application/json'}});
  const hget=(h,k)=>!h?'':(typeof h.get==='function'?(h.get(k)||''):(h[k]||h[k.toLowerCase()]||''));
  const mkP=(sku,name,cat,size,color,cost,price,stock)=>({sku,name,category:cat,size,color,cost,price,gst:gst(price),stock});
  const mkUser=(role,phone)=>({name:role==='STAFF'?'Arjun Kumar':'Priya Sharma',role:role==='STAFF'?'STAFF':'OWNER',provider:'demo',phone:phone||'',picture:''});

  function buildSale(db,raw,o){
    o=o||{};
    const items=(raw||[]).map(it=>{const p=db.products.find(x=>x.sku===it.sku)||{name:it.sku,price:0,cost:0,gst:5};
      return {sku:it.sku,name:p.name,price:p.price,cost:p.cost||0,gst:p.gst||gst(p.price),qty:it.qty};});
    const sub=items.reduce((s,c)=>s+c.price*c.qty,0);
    const tax=items.reduce((s,c)=>s+Math.round(c.price*c.qty*c.gst/100),0);
    let disc=0; if(o.disc>0)disc=o.discType==='%'?Math.round(sub*Math.min(o.disc,100)/100):Math.min(o.disc,sub);
    let redeem=0; if(o.redeem&&o.phone){const c=db.customers.find(x=>x.phone===o.phone);if(c)redeem=Math.min(c.points,sub-disc);}
    const total=Math.max(0,sub-disc+tax-redeem);
    const profit=items.reduce((s,c)=>s+(c.price-(c.cost||0))*c.qty,0)-disc-redeem;
    const earned=Math.floor(total/POINTS_PER);
    const n=(db.counters.inv=(db.counters.inv||1000)+1);
    return {inv:'INV-'+n,date:o.date||Date.now(),items:items.map(c=>({sku:c.sku,name:c.name,price:c.price,qty:c.qty})),
      sub,tax,disc,redeem,total,profit,earned,pay:o.pay||'Cash',phone:o.phone||'',name:o.name||'',returned:false};
  }
  function seed(){
    const db={products:[
      mkP('BS-SAR-0001','Kanjivaram Pure Silk','Sarees','Free','Maroon',12000,18500,6),
      mkP('BS-SAR-0002','Banarasi Katan Silk','Sarees','Free','Royal Blue',9000,14200,4),
      mkP('BS-SAR-0003','Mysore Crepe Silk','Sarees','Free','Emerald',4800,7600,0),
      mkP('BS-SAR-0004','Soft Silk Saree','Sarees','Free','Peacock Blue',2600,3900,2),
      mkP('BS-LEH-0001','Bridal Lehenga Set','Lehengas','Free','Crimson',28000,42500,3),
      mkP('BS-DRE-0001','Anarkali Gown','Dresses','L','Wine',1800,2999,7),
      mkP('BS-KUR-0001','Festive Anarkali Kurti','Kurtis','M','Mustard',900,1499,12),
      mkP('BS-KUR-0002','Cotton Straight Kurti','Kurtis','S','Indigo',520,899,18),
      mkP('BS-BLO-0001','Designer Blouse','Blouses','M','Gold',350,749,9),
      mkP('BS-OTH-0001','Silk Potli Bag','Other','—','Wine',420,980,5),
      mkP('BS-OTH-0002','Temple Jewellery Set','Other','—','Antique Gold',1600,3200,1)
    ],sales:[],purchases:[
      {date:Date.now()-2*864e5,sku:'BS-SAR-0001',name:'Kanjivaram Pure Silk',qty:4,cost:12000,supplier:'Kumaran Silks'},
      {date:Date.now()-5*864e5,sku:'BS-KUR-0001',name:'Festive Anarkali Kurti',qty:20,cost:900,supplier:'Chennai Textiles'},
      {date:Date.now()-12*864e5,sku:'BS-LEH-0001',name:'Bridal Lehenga Set',qty:3,cost:28000,supplier:'Surat Wholesale'}
    ],customers:[
      {phone:'9840012345',name:'Lakshmi Iyer',visits:6,spend:71200,points:356},
      {phone:'9000011111',name:'Meena K',visits:9,spend:103400,points:517},
      {phone:'9789054321',name:'Anitha R',visits:3,spend:14100,points:70},
      {phone:'9012345678',name:'Divya S',visits:1,spend:3900,points:19}
    ],counters:{SAR:4,LEH:1,DRE:1,KUR:2,BLO:1,OTH:2,inv:1000},
    categories:[{name:'Sarees',prefix:'SAR'},{name:'Lehengas',prefix:'LEH'},{name:'Dresses',prefix:'DRE'},{name:'Kurtis',prefix:'KUR'},{name:'Blouses',prefix:'BLO'},{name:'Other',prefix:'OTH'}],
    audit:[]};
    [
      {d:0,items:[{sku:'BS-KUR-0001',qty:2},{sku:'BS-BLO-0001',qty:1}],pay:'UPI',phone:'9840012345',name:'Lakshmi Iyer'},
      {d:0,items:[{sku:'BS-SAR-0001',qty:1}],pay:'Card',phone:'9000011111',name:'Meena K'},
      {d:1,items:[{sku:'BS-SAR-0004',qty:1},{sku:'BS-OTH-0001',qty:1}],pay:'Cash'},
      {d:2,items:[{sku:'BS-DRE-0001',qty:1}],pay:'UPI',phone:'9789054321',name:'Anitha R'},
      {d:3,items:[{sku:'BS-KUR-0002',qty:3}],pay:'Cash'},
      {d:6,items:[{sku:'BS-SAR-0002',qty:1}],pay:'Card',phone:'9000011111',name:'Meena K',disc:10,discType:'%'},
      {d:9,items:[{sku:'BS-LEH-0001',qty:1}],pay:'Card',phone:'9840012345',name:'Lakshmi Iyer'},
      {d:14,items:[{sku:'BS-BLO-0001',qty:2},{sku:'BS-KUR-0001',qty:1}],pay:'UPI'},
      {d:21,items:[{sku:'BS-OTH-0002',qty:1}],pay:'Cash',phone:'9789054321',name:'Anitha R'},
      {d:34,items:[{sku:'BS-SAR-0004',qty:2}],pay:'UPI',phone:'9000011111',name:'Meena K'},
      {d:52,items:[{sku:'BS-KUR-0002',qty:4},{sku:'BS-BLO-0001',qty:1}],pay:'Cash'},
      {d:75,items:[{sku:'BS-DRE-0001',qty:1}],pay:'Card'}
    ].forEach(s=>db.sales.push(buildSale(db,s.items,{pay:s.pay,phone:s.phone,name:s.name,disc:s.disc,discType:s.discType,date:Date.now()-s.d*864e5})));
    return db;
  }
  const save=db=>{localStorage.setItem(DB,JSON.stringify(db));return db;};
  function load(){try{const d=JSON.parse(localStorage.getItem(DB));if(d&&d.products&&d.categories&&d.audit)return d;}catch(e){}return save(seed());}

  function handle(route,method,body,token){
    if(route==='/auth/config')return J({googleEnabled:false,otpDevMode:true});
    if(route==='/auth/otp/request'&&method==='POST')return J({devCode:DEV_CODE});
    if((route==='/auth/otp/verify'||route==='/auth/exchange')&&method==='POST'){
      const role=localStorage.getItem(RKEY)||'OWNER';const u=mkUser(role,body&&body.phone);
      localStorage.setItem(UKEY,JSON.stringify(u));return J({token:'demo-'+u.role.toLowerCase(),user:u});}
    if(!token||token.indexOf('demo-')<0)return J({error:'Please sign in'},401);
    if(route==='/auth/me'){const su=localStorage.getItem(UKEY);return su?J(JSON.parse(su)):J({error:'Please sign in'},401);}
    const db=load();
    const ownerOnly=(route==='/admin/reset')||(route==='/audit')
      ||((route==='/products'||route.indexOf('/products/')===0)&&method!=='GET')
      ||(route==='/purchases'&&method==='POST')
      ||(/^\/sales\/.+\/return$/.test(route)&&method==='POST')
      ||((route==='/categories'||route.indexOf('/categories/')===0)&&method!=='GET');
    if(ownerOnly&&!isOwnerRole())return J({error:'Owners only — sign in as Owner to do that'},403);
    if(route==='/state')return J({products:db.products,sales:db.sales,purchases:db.purchases,customers:db.customers,counters:db.counters,categories:db.categories.map(c=>c.name),orders:ordersList()});
    if(route==='/categories'&&method==='GET')return J(db.categories.map(c=>c.name));
    if(route==='/categories'&&method==='POST'){const name=((body&&body.name)||'').trim();if(!name)return J({error:'Category name is required'},400);const before=db.categories.length;const c=ensureCat(db,name);if(db.categories.length>before)logA(db,'category.add','category',c.name,'prefix '+c.prefix);save(db);return J(db.categories.map(x=>x.name),201);}
    const mc=route.match(/^\/categories\/(.+)$/);
    if(mc&&method==='DELETE'){const name=decodeURIComponent(mc[1]);if(name.toLowerCase()==='other')return J({error:"The default 'Other' category can't be removed"},400);if(db.products.some(p=>(p.category||'').toLowerCase()===name.toLowerCase()))return J({error:"Move or remove products in '"+name+"' first"},400);db.categories=db.categories.filter(c=>c.name.toLowerCase()!==name.toLowerCase());logA(db,'category.delete','category',name,'');save(db);return J(db.categories.map(x=>x.name));}
    if(route==='/audit'&&method==='GET')return J(db.audit);
    if(route==='/orders'&&method==='GET')return J(ordersList());
    const mo=route.match(/^\/orders\/(.+)\/status$/);
    if(mo&&method==='POST'){const ref=decodeURIComponent(mo[1]);const ords=loadOrders();const o=ords[ref];if(!o)return J({error:'No order '+ref},404);
      const s=((body&&body.status)||'').toUpperCase();if(ORDER_FLOW_S.indexOf(s)<0&&s!=='CANCELLED')return J({error:'Unknown status'},400);
      o.status=s;o.timeline=o.timeline||[];o.timeline.push({status:s,at:Date.now()});if(body&&body.note)o.note=body.note;
      saveOrders(ords);logA(db,'order.status','order',ref,s);save(db);return J(o);}
    const mf=route.match(/^\/orders\/(.+)\/fulfil$/);
    if(mf&&method==='POST'){const ref=decodeURIComponent(mf[1]);const ords=loadOrders();const o=ords[ref];if(!o)return J({error:'No order '+ref},404);
      if(o.saleInv)return J({error:'Order '+ref+' is already billed ('+o.saleInv+')'},400);
      if((o.status||'').toUpperCase()==='CANCELLED')return J({error:"A cancelled order can't be fulfilled"},400);
      const sale=buildSale(db,(o.items||[]).map(it=>({sku:it.sku,qty:it.qty})),{pay:'Cash',phone:o.phone,name:o.name});
      sale.items.forEach(it=>{const p=db.products.find(x=>x.sku===it.sku);if(p)p.stock=Math.max(0,p.stock-it.qty);});
      if(o.phone){let c=db.customers.find(x=>x.phone===o.phone);if(!c){c={phone:o.phone,name:o.name||'Guest',visits:0,spend:0,points:0};db.customers.push(c);}c.visits+=1;c.spend+=sale.total;c.points=Math.max(0,c.points+sale.earned);}
      db.sales.push(sale);o.saleInv=sale.inv;o.status='DELIVERED';o.timeline=o.timeline||[];o.timeline.push({status:'DELIVERED',at:Date.now()});
      saveOrders(ords);logA(db,'order.fulfil','order',ref,'billed '+sale.inv);save(db);return J(o);}
    if(route==='/products'&&method==='POST'){
      const prod=mkProduct(db,body,body.size,body.color);
      db.products.push(prod);logA(db,'product.create','product',prod.sku,prod.name);save(db);return J(prod);}
    if(route==='/products/matrix'&&method==='POST'){
      const colors=(body.colors&&body.colors.length?body.colors:['']).map(x=>(x||'').trim());
      const sizes=(body.sizes&&body.sizes.length?body.sizes:['—']).map(x=>(x||'').trim());
      const style=(body.styleCode||'').trim()||('STY-'+Date.now());const out=[];
      colors.forEach(col=>sizes.forEach(sz=>{const p=mkProduct(db,Object.assign({},body,{styleCode:style}),sz||'—',col);db.products.push(p);out.push(p);}));
      logA(db,'product.matrix','product',style,out.length+' variants of '+(body.name||''));save(db);return J(out,201);}
    if(route==='/products/import'&&method==='POST'){
      const rows=(body&&body.rows)||[];if(!rows.length)return J({error:'No rows to import'},400);
      const byKey={};db.products.forEach(p=>byKey[ikey(p.name,p.size,p.color)]=p);
      let created=0,updated=0,skipped=0;const out=[];
      rows.forEach(r=>{const name=(r.name||'').trim();if(!name){skipped++;return;}
        const size=(r.size&&String(r.size).trim())?String(r.size).trim():'—';const color=(r.color||'').toString().trim();
        let cost=Math.max(0,+r.cost||0);let price=+r.price||0;if(price<=0)price=cost;const stock=Math.max(0,Math.floor(+r.stock||0));
        const ex=byKey[ikey(name,size,color)];
        if(ex){ex.stock=Math.max(0,ex.stock+stock);if(cost>0)ex.cost=cost;if(price>0){ex.price=price;ex.gst=gst(price);}out.push(ex);updated++;logA(db,'product.import','product',ex.sku,'updated '+name);}
        else{if(price<=0){skipped++;return;}const cat=ensureCat(db,r.category);const k=cat.prefix;db.counters[k]=(db.counters[k]||0)+1;const prod={sku:'BS-'+k+'-'+String(db.counters[k]).padStart(4,'0'),name:name,category:cat.name,size:size,color:color,cost:cost,price:price,gst:gst(price),stock:stock};db.products.push(prod);byKey[ikey(name,size,color)]=prod;out.push(prod);created++;logA(db,'product.import','product',prod.sku,'created '+name);}
      });
      save(db);return J({created:created,updated:updated,skipped:skipped,products:out});}
    if(route==='/products/import/ai'&&method==='POST')return J({error:'AI invoice parsing runs only on the live backend (needs an API key). Use Paste / CSV here.'},400);
    const mp=route.match(/^\/products\/(.+)$/);
    if(mp&&method==='PUT'){const sku=decodeURIComponent(mp[1]);const pr=db.products.find(x=>x.sku===sku);if(!pr)return J({error:'Product not found'},404);
      if(body.price!=null){pr.price=Math.max(0,+body.price||0);pr.gst=gst(pr.price);}if(body.stock!=null)pr.stock=Math.max(0,Math.floor(+body.stock||0));if(body.imageUrl!=null)pr.imageUrl=(body.imageUrl||'').trim();
      logA(db,'product.update','product',sku,(body.price!=null?'price ':'')+(body.stock!=null?'stock ':'')+(body.imageUrl!=null?'image':''));save(db);return J(pr);}
    if(mp&&method==='DELETE'){const sku=decodeURIComponent(mp[1]);db.products=db.products.filter(x=>x.sku!==sku);logA(db,'product.delete','product',sku,'');save(db);return J(null,204);}
    if(route==='/purchases'&&method==='POST'){const pr=db.products.find(x=>x.sku===body.sku);if(!pr)return J({error:'Product not found'},404);
      const qty=Math.max(1,Math.floor(+body.qty||0));pr.stock+=qty;if(+body.cost>0)pr.cost=+body.cost;
      const pu={date:Date.now(),sku:pr.sku,name:pr.name,qty,cost:+body.cost||0,supplier:body.supplier||''};db.purchases.push(pu);logA(db,'stock.in','product',pr.sku,'+'+qty);save(db);return J(pu);}
    if(route==='/sales'&&method==='POST'){
      const sale=buildSale(db,body.items,{pay:body.pay,phone:body.phone,name:body.name,disc:body.disc,discType:body.discType,redeem:body.redeem});
      sale.items.forEach(it=>{const p=db.products.find(x=>x.sku===it.sku);if(p)p.stock=Math.max(0,p.stock-it.qty);});
      if(body.phone){let c=db.customers.find(x=>x.phone===body.phone);if(!c){c={phone:body.phone,name:body.name||'Guest',visits:0,spend:0,points:0};db.customers.push(c);}
        if(body.name&&!c.name)c.name=body.name;c.visits+=1;c.spend+=sale.total;c.points=Math.max(0,c.points-sale.redeem+sale.earned);}
      db.sales.push(sale);logA(db,'sale.complete','sale',sale.inv,'total='+sale.total);save(db);return J(sale);}
    const mr=route.match(/^\/sales\/(.+)\/return$/);
    if(mr&&method==='POST'){const inv=decodeURIComponent(mr[1]);const s=db.sales.find(x=>x.inv===inv);
      if(s&&!s.returned){s.returned=true;s.items.forEach(it=>{const p=db.products.find(x=>x.sku===it.sku);if(p)p.stock+=it.qty;});
        if(s.phone){const c=db.customers.find(x=>x.phone===s.phone);if(c){c.spend=Math.max(0,c.spend-s.total);c.visits=Math.max(0,c.visits-1);c.points=Math.max(0,c.points-(s.earned||0)+(s.redeem||0));}}logA(db,'sale.return','sale',inv,'restocked & loyalty reversed');save(db);}
      return J(null,204);}
    if(route==='/admin/reset'&&method==='POST'){const fresh=seed();saveOrders(seedOrders());logA(fresh,'data.reset','data','','demo data reseeded');save(fresh);return J(null,204);}
    return J({error:'Not found: '+route},404);
  }

  const orig=window.fetch?window.fetch.bind(window):null;
  window.fetch=function(input,init){
    try{
      const url=(typeof input==='string')?input:(input&&input.url)||'';
      const path=new URL(url,location.href).pathname;
      if(/^\/api(\/|$)/.test(path)){
        init=init||{};
        const route=path.replace(/^\/api/,'')||'/';
        let body; if(init.body){try{body=JSON.parse(init.body);}catch(e){}}
        return Promise.resolve(handle(route,(init.method||'GET').toUpperCase(),body,hget(init.headers,'Authorization')));
      }
    }catch(e){}
    return orig?orig(input,init):Promise.reject(new Error('fetch unavailable'));
  };

  /* Inject an Owner / Staff picker into the login card and prefill the phone. */
  const seg=on=>'flex:1;padding:9px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid '+(on?'var(--maroon)':'var(--line)')+';background:'+(on?'var(--maroon)':'var(--paper)')+';color:'+(on?'#fff':'var(--muted)')+';';
  function enhanceLogin(){
    const card=document.querySelector('#authgate .logincard');
    if(!card||card.querySelector('#demoRoles'))return;
    const sub=card.querySelector('.loginsub');
    const box=document.createElement('div');box.id='demoRoles';box.style.cssText='margin:2px 0 16px';
    const cur=localStorage.getItem(RKEY)||'OWNER';
    box.innerHTML='<div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px">Demo — sign in as</div>'+
      '<div style="display:flex;gap:8px"><button type="button" data-role="OWNER" style="'+seg(cur==='OWNER')+'">Owner</button>'+
      '<button type="button" data-role="STAFF" style="'+seg(cur==='STAFF')+'">Staff</button></div>';
    if(sub&&sub.parentNode)sub.parentNode.insertBefore(box,sub.nextSibling);else card.insertBefore(box,card.firstChild);
    const paint=r=>box.querySelectorAll('[data-role]').forEach(b=>b.style.cssText=seg(b.dataset.role===r));
    box.querySelectorAll('[data-role]').forEach(b=>b.onclick=()=>{localStorage.setItem(RKEY,b.dataset.role);paint(b.dataset.role);});
    const ph=document.querySelector('#lg-phone');if(ph&&!ph.value)ph.value='90000 00000';
  }
  const start=()=>{const ag=document.getElementById('authgate');if(ag)new MutationObserver(enhanceLogin).observe(ag,{childList:true,subtree:true});enhanceLogin();};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start);else start();
})();
</script>
<script>
const I={
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',

const STORE='BHARATHI SILKS';
const CATS=['Sarees','Lehengas','Dresses','Kurtis','Blouses','Other'];
const SIZES=['—','XS','S','M','L','XL','XXL','Free'];
const LOW=3, POINTS_PER=200; // 1 loyalty point per ₹200 spent
// Indian apparel GST: 5% up to ₹1000, 12% above
const gstRate=price=>price>1000?12:5;
function cats(){return (state.categories&&state.categories.length)?state.categories:CATS;}
function isOwner(){const r=((auth.user&&auth.user.role)||'').toUpperCase();return r==='OWNER'||r==='ADMIN';}

let state={products:[],sales:[],purchases:[],customers:[],counters:{},view:'dashboard',cart:[],search:'',filter:'All',
  bill:{phone:'',name:'',disc:0,discType:'%',pay:'Cash',redeem:false}, repDays:30};
let scanner=null,scannerOn=false;

const API='/api';
let auth={token:localStorage.getItem('bs-token')||sessionStorage.getItem('bs-token')||'',user:null,cfg:{googleEnabled:false,otpDevMode:true}};
function setToken(t,remember){auth.token=t||'';localStorage.removeItem('bs-token');sessionStorage.removeItem('bs-token');if(t)(remember===false?sessionStorage:localStorage).setItem('bs-token',t);}
async function api(method,path,body){
  const opt={method,headers:{}};
  if(auth.token)opt.headers['Authorization']='Bearer '+auth.token;
  if(body!==undefined){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(body);}
  const r=await fetch(API+path,opt);
  if(r.status===401){setToken('');auth.user=null;showLogin();throw new Error('Please sign in');}
  if(!r.ok){let msg='Request failed ('+r.status+')';try{const e=await r.json();if(e&&e.error)msg=e.error;}catch(_){}throw new Error(msg);}
  if(r.status===204)return null;
  const ct=r.headers.get('content-type')||'';
  return ct.includes('application/json')?await r.json():null;
}
async function loadState(){
  const s=await api('GET','/state');
  state.products=s.products||[];state.sales=s.sales||[];state.purchases=s.purchases||[];
  state.customers=s.customers||[];state.counters=s.counters||{};state.categories=s.categories||[];state.orders=s.orders||[];
}

const $=s=>document.querySelector(s);
const inr=n=>'₹'+Math.round(Number(n)).toLocaleString('en-IN');
const find=sku=>state.products.find(p=>p.sku.toUpperCase()===String(sku).trim().toUpperCase());
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function attrText(p){const a=[];if(p.size&&p.size!=='—')a.push(p.size);if(p.color)a.push(p.color);return a.join(' · ');}
function imgSrc(p){return (p.imageUrl||'').trim();}
function imgAlt(p){return esc((p.name||'Product')+' image');}
function quickVisual(p){const src=imgSrc(p);const initials=(p.name||p.category||'?').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();return `<div class="qimg">${src?`<img src="${esc(src)}" alt="${imgAlt(p)}" loading="lazy">`:esc(initials||'?')}</div>`;}
function stockBadge(s){if(s<=0)return '<span class="badge out"><span class="dot"></span>Sold out</span>';if(s<=LOW)return '<span class="badge warn"><span class="dot"></span>Only '+s+' left</span>';return '<span class="badge ok"><span class="dot"></span>'+s+' in stock</span>';}
let toastT;
function toast(msg,type){const t=$('#toast');t.className='';clearTimeout(toastT);t.innerHTML=(type==='ok'?I.check:type==='err'?I.x:I.info)+'<span>'+esc(msg)+'</span>';void t.offsetWidth;t.className='show '+(type||'');toastT=setTimeout(()=>t.className='',2600);}

const VIEWS=[
  ['dashboard','Dashboard',I.dash,false],
  ['inventory','Inventory',I.box,false],
  ['add','Add Product',I.plus,true],
  ['categories','Categories',I.layers,true],
  ['purchases','Stock-In',I.truck,true],
  ['import','Import',I.upload,true],
  ['labels','Labels',I.tag,false],
  ['billing','Billing',I.cart,false],
  ['orders','Orders',I.bag,false],
  ['customers','Customers',I.users,false],
  ['reports','Reports',I.chart,true],
  ['audit','Audit',I.history,true]
];
const OWNER_VIEWS=new Set(VIEWS.filter(v=>v[3]).map(v=>v[0]));
function renderNav(){const vs=VIEWS.filter(v=>!v[3]||isOwner());$('#nav').innerHTML=vs.map(v=>`<button class="navbtn ${state.view===v[0]?'active':''}" data-v="${v[0]}">${v[2]}<span>${v[1]}</span></button>`).join('');document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>go(b.dataset.v));}
function go(v){if(OWNER_VIEWS.has(v)&&!isOwner())v='dashboard';stopScanner();state.view=v;render();}
function render(){
  if(OWNER_VIEWS.has(state.view)&&!isOwner())state.view='dashboard';
  renderNav();
  const m={dashboard:['Overview','Dashboard'],inventory:['Stock','Inventory'],add:['Create','Add Product'],categories:['Catalogue','Categories'],purchases:['Procurement','Stock-In & Suppliers'],import:['Bulk','Import from Invoice'],labels:['Print','Barcode Labels'],billing:['Point of Sale','Billing & Scanning'],orders:['Fulfilment','Orders & Tracking'],customers:['CRM','Customers & Loyalty'],reports:['Analytics','Reports'],audit:['Activity','Audit Log']}[state.view];
  $('#kicker').textContent=m[0];$('#title').textContent=m[1];$('#topActions').innerHTML='';
  ({dashboard:vDash,inventory:vInv,add:vAdd,categories:vCats,purchases:vPurch,import:vImport,labels:vLabels,billing:vBill,orders:vOrders,customers:vCust,reports:vReports,audit:vAudit}[state.view])();
}

/* ---------- Dashboard ---------- */
function vDash(){
  const p=state.products,units=p.reduce((s,x)=>s+x.stock,0),value=p.reduce((s,x)=>s+x.stock*x.price,0);
  const low=p.filter(x=>x.stock>0&&x.stock<=LOW),out=p.filter(x=>x.stock<=0);
  const valid=state.sales.filter(s=>!s.returned);
  const today=new Date().toDateString();
  const ts=valid.filter(s=>new Date(s.date).toDateString()===today);
  const rev=ts.reduce((s,x)=>s+x.total,0);
  $('#view').innerHTML=`
    <div class="cards">
      <div class="card stat"><div class="lbl">Products</div><div class="val">${p.length}</div><div class="sub">${new Set(p.map(x=>x.category)).size} categories · ${units} units</div></div>
      <div class="card stat"><div class="lbl">Inventory value</div><div class="val gold">${inr(value)}</div><div class="sub">at retail price</div></div>
      <div class="card stat"><div class="lbl">Sales today</div><div class="val">${inr(rev)}</div><div class="sub">${ts.length} bill${ts.length===1?'':'s'}</div></div>
      <div class="card stat"><div class="lbl">Customers</div><div class="val ok">${state.customers.length}</div><div class="sub">in loyalty program</div></div>
    </div>
    <div class="panel"><div class="panel-h"><h3>Low &amp; out of stock</h3><span class="live"><span class="dot"></span>updates as you sell</span></div>
      <div class="panel-b">${(low.length+out.length)===0?'<div class="empty">Everything is well stocked. 🎉</div>':
        `<table><thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Status</th></tr></thead><tbody>
        ${[...out,...low].map(x=>`<tr><td>${esc(x.name)} <span class="attr">${attrText(x)}</span></td><td class="sku">${x.sku}</td><td><span class="badge cat">${x.category}</span></td><td>${stockBadge(x.stock)}</td></tr>`).join('')}
        </tbody></table>`}</div></div>`;
}

/* ---------- Inventory ---------- */
function vInv(){
  const own=isOwner();
  $('#topActions').innerHTML=own?`<button class="btn btn-gold" id="ta">${I.plus}Add product</button>`:'';
  if(own)$('#ta').onclick=()=>go('add');
  const list=state.products.filter(p=>(state.filter==='All'||p.category===state.filter)&&(p.name.toLowerCase().includes(state.search.toLowerCase())||p.sku.toLowerCase().includes(state.search.toLowerCase())));
  $('#view').innerHTML=`
    <div class="panel"><div class="panel-h">
      <div class="search">${I.search}<input id="sx" placeholder="Search name or SKU…" value="${esc(state.search)}"></div>
      <div class="filters">${['All',...cats()].map(c=>`<button class="filterbtn ${state.filter===c?'active':''}" data-c="${esc(c)}">${esc(c)}</button>`).join('')}</div>
    </div><div class="panel-b">
      ${list.length===0?'<div class="empty">No products found.</div>':
      `<table><thead><tr><th>Product</th><th>SKU</th><th>Category</th>${own?'<th>Cost</th>':''}<th>Price</th><th>GST</th><th>Stock</th>${own?'<th>Image</th>':''}<th>Status</th>${own?'<th></th>':''}</tr></thead><tbody>
      ${list.map(p=>`<tr data-sku="${esc(p.sku)}">
        <td>${quickVisual(p)}<div style="margin-top:6px">${esc(p.name)}<div class="attr">${attrText(p)}</div></div></td>
        <td class="sku">${esc(p.sku)}</td><td><span class="badge cat">${esc(p.category)}</span></td>
        ${own?`<td class="price" style="color:var(--muted)">${p.cost?inr(p.cost):'—'}</td>`:''}
        <td>${own?`<input class="tinp price-i" type="number" value="${p.price}" min="0">`:`<span class="price">${inr(p.price)}</span>`}</td>
        <td><span class="badge info">${p.gst||gstRate(p.price)}%</span></td>
        <td>${own?`<input class="tinp stock-i" type="number" value="${p.stock}" min="0">`:p.stock}</td>
        ${own?`<td><input class="tinp img-i" type="url" value="${esc(p.imageUrl||'')}" placeholder="Image URL"></td>`:''}
        <td>${stockBadge(p.stock)}</td>
        ${own?`<td style="white-space:nowrap"><button class="btn btn-ghost btn-sm save-b">Save</button> <button class="btn btn-danger btn-sm del-b">${I.trash}</button></td>`:''}
      </tr>`).join('')}</tbody></table>`}
    </div></div>`;
  $('#sx').oninput=e=>{state.search=e.target.value;const v=e.target.value;vInv();const n=$('#sx');n.focus();n.value=v;n.setSelectionRange(v.length,v.length);};
  document.querySelectorAll('.filterbtn').forEach(b=>b.onclick=()=>{state.filter=b.dataset.c;vInv();});
  if(own)document.querySelectorAll('tr[data-sku]').forEach(tr=>{
    const sku=tr.dataset.sku;
    tr.querySelector('.save-b').onclick=async()=>{const price=Math.max(0,+tr.querySelector('.price-i').value||0);const stock=Math.max(0,Math.floor(+tr.querySelector('.stock-i').value||0));const imageUrl=tr.querySelector('.img-i').value.trim();try{await api('PUT','/products/'+encodeURIComponent(sku),{price,stock,imageUrl});await loadState();toast('Saved','ok');}catch(e){toast(e.message,'err');}vInv();};
    tr.querySelector('.del-b').onclick=async()=>{if(!confirm('Delete this product?'))return;try{await api('DELETE','/products/'+encodeURIComponent(sku));await loadState();toast('Product deleted','ok');}catch(e){toast(e.message,'err');}vInv();};
  });
}

/* ---------- Add ---------- */
function csvVals(v){return v.split(',').map(x=>x.trim()).filter(Boolean);}
function vAdd(){
  $('#view').innerHTML=`
    <div class="hint">${I.info}<div>A unique <b>SKU</b> is auto-generated and becomes the product barcode. Use <b>matrix mode</b> to create one parent style across multiple colour/size variants in a single save.</div></div>
    <div class="panel" style="max-width:680px"><div class="panel-h"><h3>New product / variant matrix</h3></div><div class="panel-b" style="padding:22px">
      <div class="field"><label>Product / style name</label><input class="input" id="f-name" placeholder="e.g. Soft Silk Saree — Peacock Blue"></div>
      <div class="row3">
        <div class="field"><label>Category</label><select class="select" id="f-cat">${cats().map(c=>`<option>${esc(c)}</option>`).join('')}</select></div>
        <div class="field"><label>Fabric (optional)</label><input class="input" id="f-fabric" placeholder="e.g. Kanjivaram silk"></div>
        <div class="field"><label>Design / weave (optional)</label><input class="input" id="f-design" placeholder="e.g. Zari border"></div>
      </div>
      <div class="field"><label>Style code (optional)</label><input class="input" id="f-style" placeholder="Leave blank to auto-generate for matrix"></div>
      <label style="display:flex;gap:8px;align-items:center;margin:0 0 12px;color:var(--muted);font-size:13px"><input type="checkbox" id="f-matrix"> Create multiple variants from colour/size matrix</label>
      <div class="row3">
        <div class="field"><label>Size</label><select class="select" id="f-size">${SIZES.map(s=>`<option>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Colour</label><input class="input" id="f-color" placeholder="e.g. Magenta"></div>
        <div class="field"><label>Opening stock / variant</label><input class="input" id="f-stock" type="number" min="0" value="1"></div>
      </div>
      <div id="matrixFields" style="display:none">
        <div class="row3">
          <div class="field"><label>Matrix sizes</label><input class="input" id="f-sizes" placeholder="M, L, XL or Free"></div>
          <div class="field"><label>Matrix colours</label><input class="input" id="f-colors" placeholder="Magenta, Royal Blue"></div>
          <div class="field"><label>Preview</label><div class="hint" style="margin:0;padding:9px 10px"><div id="matrixPreview">1 variant</div></div></div>
        </div>
      </div>
      <div class="field"><label>Product image URL (optional)</label><input class="input" id="f-image" type="url" placeholder="https://example.com/saree-photo.jpg"></div>
      <div class="row3">
        <div class="field"><label>Cost price (₹)</label><input class="input" id="f-cost" type="number" min="0" placeholder="0"></div>
        <div class="field"><label>Selling price (₹)</label><input class="input" id="f-price" type="number" min="0" placeholder="0"></div>
        <div class="field"><label>GST</label><div class="hint" style="margin:0;padding:9px 10px"><div>Auto: 5% up to ₹1,000, 12% above.</div></div></div>
      </div>
      <button class="btn btn-primary" id="f-save" style="width:100%;margin-top:6px">${I.plus}Add to inventory</button>
    </div></div>`;
  const matrix=$('#f-matrix'),mfields=$('#matrixFields'),preview=$('#matrixPreview');
  const refreshPreview=()=>{
    mfields.style.display=matrix.checked?'block':'none';
    const colors=csvVals($('#f-colors').value || $('#f-color').value || '');
    const sizes=csvVals($('#f-sizes').value || $('#f-size').value || '—');
    preview.textContent=(Math.max(colors.length,1)*Math.max(sizes.length,1))+' variant(s)';
  };
  ['f-matrix','f-colors','f-sizes','f-color','f-size'].forEach(id=>$('#'+id).oninput=refreshPreview);refreshPreview();
  $('#f-save').onclick=async()=>{
    const name=$('#f-name').value.trim(),cat=$('#f-cat').value,imageUrl=$('#f-image').value.trim();
    const styleCode=$('#f-style').value.trim(),fabric=$('#f-fabric').value.trim(),design=$('#f-design').value.trim();
    const cost=+$('#f-cost').value||0,price=+$('#f-price').value||0,stock=Math.max(0,Math.floor(+$('#f-stock').value||0));

    try{
      if(matrix.checked){
        const colors=csvVals($('#f-colors').value||$('#f-color').value||'');
        const sizes=csvVals($('#f-sizes').value||$('#f-size').value||'—');

      }else{
        const size=$('#f-size').value,color=$('#f-color').value.trim();

        await loadState();toast(name+' added · '+p.sku,'ok');go('inventory');
      }
    }catch(e){toast(e.message,'err');}
  };
}

/* ---------- Billing / POS ---------- */
function getCust(phone){return state.customers.find(c=>c.phone===phone);}
function billTotals(){
  const sub=state.cart.reduce((s,c)=>s+c.price*c.qty,0);
  const tax=state.cart.reduce((s,c)=>s+Math.round(c.price*c.qty*(c.gst||gstRate(c.price))/100),0);
  let disc=0; const b=state.bill;
  if(b.disc>0)disc=b.discType==='%'?Math.round(sub*Math.min(b.disc,100)/100):Math.min(b.disc,sub);
  let redeem=0;
  if(b.redeem&&b.phone){const c=getCust(b.phone);if(c)redeem=Math.min(c.points,sub-disc);}
  const total=Math.max(0,sub-disc+tax-redeem);
  return {sub,tax,disc,redeem,total};
}

function renderQuick(){

function addToCart(sku){
  const p=find(sku);if(!p){toast('No product for code "'+sku.trim()+'"','err');return;}
  const line=state.cart.find(c=>c.sku===p.sku);const inCart=line?line.qty:0;
  if(inCart>=p.stock){toast(p.name+': only '+p.stock+' in stock','err');refocus();return;}
  if(line)line.qty++;else state.cart.push({sku:p.sku,name:p.name,price:p.price,cost:p.cost||0,gst:p.gst||gstRate(p.price),qty:1});
  const box=$('#scanbox');if(box){box.classList.remove('flash');void box.offsetWidth;box.classList.add('flash');}
  renderCart();refocus();

function changeQty(sku,d){const line=state.cart.find(c=>c.sku===sku);if(!line)return;const p=find(sku);if(d>0&&line.qty>=p.stock){toast('Only '+p.stock+' in stock','err');return;}line.qty+=d;if(line.qty<=0)state.cart=state.cart.filter(c=>c.sku!==sku);renderCart();}

    ${c&&c.points>0?`<div class="trow"><span><label style="cursor:pointer"><input type="checkbox" id="redeem" ${b.redeem?'checked':''}> Redeem ${c.points} pts</label></span><span class="price">−${inr(t.redeem)}</span></div>`:''}

  $('#disc').oninput=e=>{b.disc=Math.max(0,+e.target.value||0);renderCart();};

  $('#payBtn').onclick=completeSale;
  $('#clearBtn').onclick=()=>{state.cart=[];state.bill={phone:'',name:'',disc:0,discType:'%',pay:'Cash',redeem:false};vBill();};
}
async function completeSale(){
  if(state.cart.length===0)return;
  const b=state.bill;
  const payload={items:state.cart.map(c=>({sku:c.sku,qty:c.qty})),phone:b.phone||'',name:b.name||'',disc:b.disc||0,discType:b.discType,pay:b.pay,redeem:!!b.redeem};
  let sale;
  try{sale=await api('POST','/sales',payload);}catch(e){toast(e.message,'err');return;}
  await loadState();
  showReceipt(sale);
  state.cart=[];state.bill={phone:'',name:'',disc:0,discType:'%',pay:'Cash',redeem:false};
  renderQuick();vBill();
}
function receiptText(s){

  if(s.disc>0)lines.push('Discount -'+inr(s.disc));
  if(s.redeem>0)lines.push('Points -'+inr(s.redeem));
  lines.push('GST '+inr(s.tax),'TOTAL '+inr(s.total),'Paid via '+s.pay,'','Thank you for shopping with us!');

/* ---------- Import from invoice ---------- */
let importRaw=null,importHeaders=null,importMap=[],importRows=[];
const IMPORT_FIELDS=['ignore','name','category','size','color','cost','price','stock'];
const FIELD_SYN={name:['name','product','item','description','desc'],category:['category','cat','type'],size:['size'],color:['color','colour','shade'],cost:['cost','purchase','rate','buy'],price:['price','mrp','sell','selling','retail'],stock:['stock','qty','quantity','count','pcs','units']};
function guessField(h){const x=(h||'').trim().toLowerCase();for(const f of Object.keys(FIELD_SYN))if(FIELD_SYN[f].some(s=>x===s||x.includes(s)))return f;return 'ignore';}
function impNum(v){const n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;}
function fileB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result));r.onerror=rej;r.readAsDataURL(file);});}
function loadMap(sup){try{return JSON.parse(localStorage.getItem('bs-import-map-'+sup.toLowerCase()));}catch(e){return null;}}
function saveMap(sup,map){localStorage.setItem('bs-import-map-'+sup.toLowerCase(),JSON.stringify(map));}
function vImport(){
  $('#view').innerHTML=`
    <div class="hint">${I.info}<div>Feed products from a supplier invoice. <b>Paste</b> rows (CSV or tab-separated, e.g. copied from Excel) or <b>upload</b> an invoice image/PDF to read automatically. Map the columns once per supplier — it's remembered next time. Unknown categories are created automatically.</div></div>
    <div class="row2">
      <div class="panel"><div class="panel-h"><h3>Paste rows</h3></div><div class="panel-b" style="padding:16px">
        <div class="field"><label>Supplier (optional — remembers the layout)</label><input class="input" id="imp-sup" placeholder="e.g. Kumaran Silks"></div>
        <textarea class="input" id="imp-text" rows="7" placeholder="name, category, size, color, cost, price, stock&#10;Kanjivaram Silk, Sarees, Free, Maroon, 6200, 8500, 4"></textarea>
        <button class="btn btn-primary" id="imp-parse" style="width:100%;margin-top:10px">Parse rows</button>
      </div></div>
      <div class="panel"><div class="panel-h"><h3>Upload invoice (AI)</h3></div><div class="panel-b" style="padding:16px">
        <div class="hint" style="margin:0 0 12px">${I.info}<div>Reads an invoice photo or PDF with AI. Runs on the live server only (needs an API key), so it's unavailable in this static demo.</div></div>
        <input type="file" id="imp-file" accept="image/*,.pdf" class="input">
        <button class="btn btn-gold" id="imp-ai" style="width:100%;margin-top:10px">${I.upload}Parse with AI</button>
      </div></div>
    </div>
    <div id="imp-map"></div>
    <div id="imp-preview"></div>`;
  importRaw=null;importHeaders=null;importMap=[];importRows=[];
  $('#imp-parse').onclick=()=>{
    const text=$('#imp-text').value.trim();if(!text){toast('Paste some rows first','err');return;}
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    const delim=lines[0].includes('\t')?'\t':',';
    const rows=lines.map(l=>l.split(delim).map(c=>c.trim().replace(/^"|"$/g,'')));
    const headerGuess=rows[0].map(guessField);
    const hasHeader=headerGuess.some(f=>f!=='ignore')&&rows[0].every(c=>c===''||isNaN(parseFloat(c)));
    importHeaders=hasHeader?rows[0]:rows[0].map((_,i)=>'Column '+(i+1));
    importRaw=hasHeader?rows.slice(1):rows;
    const sup=$('#imp-sup').value.trim();
    const saved=sup?loadMap(sup):null;
    if(saved&&saved.length===importHeaders.length)importMap=saved;
    else if(hasHeader)importMap=importHeaders.map(h=>guessField(h));
    else{const order=['name','category','size','color','cost','price','stock'];importMap=importHeaders.map((_,i)=>order[i]||'ignore');}
    renderImportMap();
  };
  $('#imp-ai').onclick=async()=>{
    const f=$('#imp-file').files&&$('#imp-file').files[0];if(!f){toast('Choose an invoice file','err');return;}
    toast('Reading invoice…','info');
    try{const b64=await fileB64(f);const rows=await api('POST','/products/import/ai',{fileBase64:b64,mediaType:f.type});importRaw=null;$('#imp-map').innerHTML='';renderImportPreview(rows);toast('Parsed '+rows.length+' line(s) — review & import','ok');}
    catch(e){toast(e.message,'err');}
  };
}
function mappedRows(){
  if(!importRaw)return [];
  return importRaw.map(cells=>{const r={};importMap.forEach((f,i)=>{if(f!=='ignore')r[f]=cells[i];});
    return {name:(r.name||'').trim(),category:(r.category||'Other').trim()||'Other',size:(r.size||'').trim(),color:(r.color||'').trim(),cost:impNum(r.cost),price:impNum(r.price),stock:Math.round(impNum(r.stock))};}).filter(r=>r.name);
}
function renderImportMap(){
  const m=$('#imp-map');if(!m)return;
  m.innerHTML=`<div class="panel"><div class="panel-h"><h3>Map columns</h3><button class="btn btn-ghost btn-sm" id="imp-remember">Remember for supplier</button></div><div class="panel-b" style="padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap">
    ${importHeaders.map((h,i)=>`<div class="field" style="margin:0"><label>${esc(h)}</label><select class="select imp-col" data-i="${i}">${IMPORT_FIELDS.map(f=>`<option value="${f}" ${importMap[i]===f?'selected':''}>${f}</option>`).join('')}</select></div>`).join('')}
  </div></div>`;
  document.querySelectorAll('.imp-col').forEach(s=>s.onchange=()=>{importMap[+s.dataset.i]=s.value;renderImportPreview(mappedRows());});
  $('#imp-remember').onclick=()=>{const sup=$('#imp-sup').value.trim();if(!sup){toast('Enter a supplier name first','err');return;}saveMap(sup,importMap);toast('Layout saved for '+sup,'ok');};
  renderImportPreview(mappedRows());
}
function renderImportPreview(rows){
  const el=$('#imp-preview');if(!el)return;importRows=rows||[];
  if(!rows||rows.length===0){el.innerHTML='<div class="panel"><div class="panel-b"><div class="empty">No rows to preview yet.</div></div></div>';return;}
  el.innerHTML=`<div class="panel"><div class="panel-h"><h3>Preview</h3><button class="btn btn-primary" id="imp-go">${I.upload}Import ${rows.length} product(s)</button></div><div class="panel-b">
    <table><thead><tr><th>Name</th><th>Category</th><th>Attributes</th><th>Cost</th><th>Price</th><th>Stock</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td><span class="badge cat">${esc(r.category||'Other')}</span></td><td class="attr">${esc([r.size,r.color].filter(x=>x&&x!=='—').join(' · '))}</td><td class="price">${r.cost?inr(r.cost):'—'}</td><td class="price">${r.price?inr(r.price):'—'}</td><td>${r.stock||0}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  $('#imp-go').onclick=doImport;
}
async function doImport(){
  if(!importRows||!importRows.length){toast('Nothing to import','err');return;}
  try{const res=await api('POST','/products/import',{rows:importRows});await loadState();toast('Imported — '+res.created+' new, '+res.updated+' updated'+(res.skipped?', '+res.skipped+' skipped':''),'ok');importRows=[];importRaw=null;go('inventory');}
  catch(e){toast(e.message,'err');}
}

/* ---------- Orders & fulfilment ---------- */
const ORDER_FLOW=['PLACED','CONFIRMED','PACKED','SHIPPED','DELIVERED'];
const ORDER_LABEL={PLACED:'Placed',CONFIRMED:'Confirmed',PACKED:'Packed',SHIPPED:'Shipped',DELIVERED:'Delivered',CANCELLED:'Cancelled'};
function orderBadge(s){s=(s||'PLACED').toUpperCase();const cls=s==='DELIVERED'?'ok':s==='CANCELLED'?'out':s==='SHIPPED'?'info':'warn';return `<span class="badge ${cls}"><span class="dot"></span>${ORDER_LABEL[s]||s}</span>`;}
let orderFilter='Open';
function vOrders(){
  const all=state.orders||[];
  const open=all.filter(o=>{const s=(o.status||'').toUpperCase();return s!=='DELIVERED'&&s!=='CANCELLED';});
  const list=orderFilter==='Open'?open:(orderFilter==='All'?all:all.filter(o=>(o.status||'').toUpperCase()===orderFilter));
  $('#view').innerHTML=`
    <div class="cards">
      <div class="card stat"><div class="lbl">Open orders</div><div class="val">${open.length}</div><div class="sub">awaiting fulfilment</div></div>
      <div class="card stat"><div class="lbl">Total orders</div><div class="val gold">${all.length}</div><div class="sub">all time</div></div>
      <div class="card stat"><div class="lbl">Order value</div><div class="val ok">${inr(all.reduce((s,o)=>s+(o.total||0),0))}</div><div class="sub">placed online</div></div>
    </div>
    <div class="panel-h" style="border:none;padding:0 0 12px"><div class="filters">${['Open','All','PLACED','CONFIRMED','PACKED','SHIPPED','DELIVERED','CANCELLED'].map(f=>`<button class="filterbtn ${orderFilter===f?'active':''}" data-f="${f}">${f==='Open'||f==='All'?f:ORDER_LABEL[f]}</button>`).join('')}</div></div>
    ${list.length===0?'<div class="panel"><div class="panel-b"><div class="empty">No orders in this view.</div></div></div>':`<div class="ogrid">${list.map(orderCard).join('')}</div>`}`;
  document.querySelectorAll('.filterbtn').forEach(b=>b.onclick=()=>{orderFilter=b.dataset.f;vOrders();});
  document.querySelectorAll('.o-next').forEach(b=>b.onclick=()=>setOrderStatus(b.dataset.ref,b.dataset.s));
  document.querySelectorAll('.o-cancel').forEach(b=>b.onclick=()=>{if(confirm('Cancel order '+b.dataset.ref+'?'))setOrderStatus(b.dataset.ref,'CANCELLED');});
  document.querySelectorAll('.o-fulfil').forEach(b=>b.onclick=()=>{if(confirm('Bill & fulfil '+b.dataset.ref+'? This creates a sale and reduces stock.'))fulfilOrder(b.dataset.ref);});
}
function orderCard(o){
  const s=(o.status||'PLACED').toUpperCase();
  const next=ORDER_FLOW[ORDER_FLOW.indexOf(s)+1];
  const showNext=next&&next!=='DELIVERED';
  const open=s!=='DELIVERED'&&s!=='CANCELLED';
  const items=(o.items||[]).map(it=>`<div class="oi"><div class="oi-t" style="${it.imageUrl?'':'background:linear-gradient(135deg,var(--maroon),var(--gold))'}">${it.imageUrl?`<img src="${esc(it.imageUrl)}" alt="">`:esc((it.name||'?').slice(0,1).toUpperCase())}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">${esc(it.name)}</div><div class="attr">${it.qty} × ${inr(it.price)}</div></div></div>`).join('');
  return `<div class="panel ocard"><div class="panel-b" style="padding:16px 18px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div><span class="sku">${esc(o.ref)}</span><div style="font-weight:600;margin-top:3px">${esc(o.name||'Guest')}</div><div class="attr">${esc(o.phone||'')} · ${esc(o.fulfilment||'Delivery')}</div></div>
      ${orderBadge(s)}
    </div>
    ${o.address?`<div class="attr" style="margin:8px 0 0">${esc(o.address)}</div>`:''}
    <div class="oitems">${items}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)">
      <span style="font-size:12px;color:var(--muted)">${new Date(o.date).toLocaleString('en-IN')}</span>
      <span class="price" style="font-weight:700">${inr(o.total)}</span>
    </div>
    ${o.saleInv?`<div class="attr" style="margin-top:10px;color:var(--ok);font-weight:600">✓ Billed · ${esc(o.saleInv)}</div>`:open?`<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      ${showNext?`<button class="btn btn-ghost btn-sm o-next" data-ref="${esc(o.ref)}" data-s="${next}">Mark ${ORDER_LABEL[next]}</button>`:''}
      <button class="btn btn-primary btn-sm o-fulfil" data-ref="${esc(o.ref)}">${I.check}Bill &amp; fulfil</button>
      <button class="btn btn-danger btn-sm o-cancel" data-ref="${esc(o.ref)}">Cancel</button>
    </div>`:''}
  </div></div>`;
}

    }
  };
  const codeEl=$('#lg-code');if(codeEl)codeEl.onkeydown=e=>{if(e.key==='Enter')action.click();};
  phoneEl.onkeydown=e=>{if(e.key==='Enter'&&stage==='request')action.click();};
}
async function consumeHash(){
  const h=location.hash||'';
  if(h.indexOf('code=')<0&&h.indexOf('token=')<0)return;
  const grab=k=>h.indexOf(k)>=0?decodeURIComponent(h.split(k)[1].split('&')[0]):'';
  const code=grab('code='),tok=grab('token=');
  history.replaceState(null,'',location.pathname+location.search);
  if(code){try{const r=await api('POST','/auth/exchange',{code});setToken(r.token,true);auth.user=r.user;}catch(e){toast('Sign-in link expired — please try again','err');}}
  else if(tok){setToken(tok,true);}
}
async function boot(){
  await consumeHash();
  try{auth.cfg=await api('GET','/auth/config');}catch(e){}
  if(auth.token){
    try{auth.user=await api('GET','/auth/me');await loadState();showApp();render();return;}
    catch(e){setToken('');auth.user=null;}
  }
  showLogin();
}
boot();
</script>
